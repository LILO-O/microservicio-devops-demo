name: CI/CD Pipeline
name: CI Pipeline

on:
  push:
    branches: [develop]

  pull_request:
    branches: [main]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar pruebas
        run: npm test

  docker:
    needs: test
    
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código

        uses: actions/checkout@v4

      - name: Construir imagen Docker
        run: docker build -t microservicio-devops-demo .

        uses: actions/checkout@v3

      - name: Ejecutar script
        run: echo "Pipeline ejecutándose"

